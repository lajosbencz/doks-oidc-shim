---
# Edit OIDC_ISSUER and OIDC_CLIENT_ID before applying.
apiVersion: v1
kind: ConfigMap
metadata:
  name: doks-oidc-shim
  namespace: headlamp
data:
  OIDC_ISSUER: "https://your-oidc-issuer.example.com"
  OIDC_CLIENT_ID: "headlamp"
  GROUPS_CLAIM: "groups"
  LISTEN: ":4443"
  TLS_CERT_FILE: "/tls/tls.crt"
  TLS_KEY_FILE: "/tls/tls.key"
  # ALLOW_PASSTHROUGH is required when Headlamp runs in-cluster (-in-cluster flag).
  # Headlamp uses its own projected SA token for some internal API calls; those tokens
  # are not OIDC tokens and would otherwise be rejected. With passthrough enabled they
  # are forwarded unchanged to the real k8s API and authorized there as usual.
  ALLOW_PASSTHROUGH: "true"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doks-oidc-shim
  namespace: headlamp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doks-oidc-shim
  template:
    metadata:
      labels:
        app: doks-oidc-shim
    spec:
      serviceAccountName: doks-oidc-shim
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: shim
          image: ghcr.io/lajosbencz/doks-oidc-shim:latest
          imagePullPolicy: Always
          ports:
            - name: https
              containerPort: 4443
              protocol: TCP
          envFrom:
            - configMapRef:
                name: doks-oidc-shim
          env:
            - name: K8S_CA_FILE
              value: /var/run/secrets/kubernetes.io/ca.crt
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: kube-ca
              mountPath: /var/run/secrets/kubernetes.io
              readOnly: true
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: token-k8s-view
              mountPath: /var/run/secrets/tokens/k8s-view
              readOnly: true
            - name: token-k8s-edit
              mountPath: /var/run/secrets/tokens/k8s-edit
              readOnly: true
            - name: token-k8s-admin
              mountPath: /var/run/secrets/tokens/k8s-admin
              readOnly: true
      volumes:
        - name: kube-ca
          configMap:
            name: kube-root-ca.crt
            items:
              - key: ca.crt
                path: ca.crt
        - name: tls
          secret:
            secretName: doks-oidc-shim-tls
        - name: token-k8s-view
          secret:
            secretName: shim-k8s-view-token
            items:
              - key: token
                path: token
        - name: token-k8s-edit
          secret:
            secretName: shim-k8s-edit-token
            items:
              - key: token
                path: token
        - name: token-k8s-admin
          secret:
            secretName: shim-k8s-admin-token
            items:
              - key: token
                path: token

---
# The service exposes port 443 externally. Headlamp is configured to use this
# service as its Kubernetes API endpoint (see headlamp-values.yaml).
apiVersion: v1
kind: Service
metadata:
  name: doks-oidc-shim
  namespace: headlamp
spec:
  selector:
    app: doks-oidc-shim
  ports:
    - name: https
      port: 443
      targetPort: https
      protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: doks-oidc-shim
  namespace: headlamp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: doks-oidc-shim
