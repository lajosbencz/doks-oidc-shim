---
# Edit OIDC_ISSUER and OIDC_CLIENT_ID before applying.
apiVersion: v1
kind: ConfigMap
metadata:
  name: doks-oidc-shim
  namespace: oidc-shim
data:
  OIDC_ISSUER: "https://your-oidc-issuer.example.com"
  OIDC_CLIENT_ID: "your-client-id"
  # GROUPS_CLAIM: "groups"   # default; set if your provider uses a different claim name

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doks-oidc-shim
  namespace: oidc-shim
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doks-oidc-shim
  template:
    metadata:
      labels:
        app: doks-oidc-shim
    spec:
      serviceAccountName: doks-oidc-shim
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: shim
          image: ghcr.io/lajosbencz/doks-oidc-shim:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: doks-oidc-shim
          env:
            # K8S_API is auto-detected from KUBERNETES_SERVICE_HOST/PORT injected by k8s.
            # K8S_CA_FILE is auto-detected from the kube-root-ca.crt volume below.
            - name: K8S_CA_FILE
              value: /var/run/secrets/kubernetes.io/ca.crt
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: kube-ca
              mountPath: /var/run/secrets/kubernetes.io
              readOnly: true
            - name: token-view
              mountPath: /var/run/secrets/tokens/view
              readOnly: true
            - name: token-edit
              mountPath: /var/run/secrets/tokens/edit
              readOnly: true
            - name: token-admin
              mountPath: /var/run/secrets/tokens/admin
              readOnly: true
      volumes:
        # Cluster CA cert — populated automatically by k8s in every namespace.
        - name: kube-ca
          configMap:
            name: kube-root-ca.crt
            items:
              - key: ca.crt
                path: ca.crt
        - name: token-view
          secret:
            secretName: shim-view-token
            items:
              - key: token
                path: token
        - name: token-edit
          secret:
            secretName: shim-edit-token
            items:
              - key: token
                path: token
        - name: token-admin
          secret:
            secretName: shim-admin-token
            items:
              - key: token
                path: token

---
apiVersion: v1
kind: Service
metadata:
  name: doks-oidc-shim
  namespace: oidc-shim
spec:
  selector:
    app: doks-oidc-shim
  ports:
    - name: http
      port: 443
      targetPort: http
      protocol: TCP
